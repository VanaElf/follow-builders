name: Send Daily Digest

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Create config for Actions environment
        run: |
          mkdir -p ~/.follow-builders
          cat > ~/.follow-builders/config.json << 'CFGEOF'
          {
            "platform": "other",
            "language": "zh",
            "timezone": "Asia/Shanghai",
            "frequency": "daily",
            "delivery": {
              "method": "email",
              "email": "${{ secrets.DIGEST_EMAIL }}"
            },
            "onboardingComplete": true
          }
          CFGEOF

      - name: Run prepare-digest
        env:
          DIGEST_LANGUAGE: zh
        run: |
          cd scripts
          node prepare-digest.js > /tmp/digest-data.json
          echo "Prepare done, size: $(wc -c < /tmp/digest-data.json) bytes"

      - name: Format digest (no AI)
        env:
          DIGEST_LANGUAGE: zh
        run: |
          cd scripts
          node format-digest.js /tmp/digest-data.json > /tmp/digest-text.txt
          echo "Format done, size: $(wc -c < /tmp/digest-text.txt) bytes"

      - name: Send via Resend
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: |
          cd scripts
          node deliver.js --file /tmp/digest-text.txt
