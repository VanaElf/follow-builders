name: Send Daily Digest

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run prepare-digest and remix with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_LANGUAGE: zh
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: |
          cd scripts
          node prepare-digest.js 2>/dev/null > /tmp/digest-data.json
          node remix-digest.js /tmp/digest-data.json > /tmp/digest-text.txt 2>/dev/null
          echo "Remix done, length: $(wc -c < /tmp/digest-text.txt)"

      - name: Send via Resend
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: |
          cd scripts
          node deliver.js --file /tmp/digest-text.txt
